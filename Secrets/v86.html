<!doctype html>
<title>Basic Emulator</title><!-- not BASIC! -->

<script src="https://cdn.jsdelivr.net/npm/v86@0.5.419/build/libv86.js"></script>
<script>
window.onload = function()
{
    var emulator = window.emulator = new V86({
        wasm_path: "https://cdn.jsdelivr.net/npm/v86@0.5.419/build/v86.wasm",
        memory_size: 32 * 1024 * 1024,
        vga_memory_size: 2 * 1024 * 1024,
        screen_container: document.getElementById("screen_container"),
        bios: {
            url: "https://cdn.jsdelivr.net/npm/v86-system@0.5.0/assets/seabios.bin",
        },
        vga_bios: {
            url: "https://cdn.jsdelivr.net/npm/v86-system@0.5.0/assets/vgabios.bin",
        },
        fd0: {
            url: "https://copy.sh/v86/images/windows101.img",
        },
        autostart: true,
    });
}
</script>

<!-- A minimal structure for the ScreenAdapter defined in browser/screen.js -->
<div id="screen_container">
    <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
    <canvas style="display: none"></canvas>
</div>
